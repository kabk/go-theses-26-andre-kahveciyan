<html lang="en">
<head>

<body class="landing">

  <div id="slideshow"></div>

  <script>
    // ── ADD MORE IMAGES HERE ─────────────────────────────────
    // Just add the filename to this array and drop the file
    // in the images/ folder. They will appear in the slideshow.
    const images = [
      "print1.jpg","print12.jpg","print13.jpg","print14.jpg","print15.jpg",
      "print16.jpg","print17.jpg","print18.jpg","print19.jpg","print110.jpg",
      "print111.jpg","print112.jpg","print113.jpg","print114.jpg","print115.jpg",
      "print116.jpg","print117.jpg","print118.jpg","print119.jpg","print120.jpg",
      "print121.jpg","print122.jpg","print123.jpg","print124.jpg","print125.jpg",
      "print126.jpg","print127.jpg","print128.jpg","print129.jpg","print130.jpg",
      "print131.jpg","print132.jpg","print133.jpg","print134.jpg","print135.jpg",
      "print136.jpg","print137.jpg","print138.jpg","print139.jpg","print140.jpg",
      "print141.jpg","print142.jpg","print143.jpg","print144.jpg","print145.jpg",
      "print146.jpg"
    ];

    const slideshow = document.getElementById('slideshow');
    let current = 0;
    let slides = [];

    images.forEach((img, i) => {
      const div = document.createElement('div');
      div.className = 'slide' + (i === 0 ? ' active' : '');
      div.style.backgroundImage = `url('images/${img}')`;
      slideshow.appendChild(div);
      slides.push(div);
    });

    setInterval(() => {
      slides[current].classList.remove('active');
      current = (current + 1) % slides.length;
      slides[current].classList.add('active');
    }, 2500);

    document.body.addEventListener('click', () => {
      window.location.href = 'essay.html';
    });
  </script>

</body>
</html>
